version: '3.8'
services:
  mlflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /app/mlruns
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/app/mlruns
      - ../data:/app/data
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000

  train:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ../data:/app/data
      - ../mlruns:/app/mlruns
    command: python src/models/train.py --config config.yaml